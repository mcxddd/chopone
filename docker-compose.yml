version: "3.8"

services:
  frontend:
    build:
      context: ./choponefront
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped

  backend:
    build:
      context: ./choponeback
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - data:/app/data
    environment:
      - FLASK_ENV=production
      - DATA_DIR=/app/data
      - UPLOAD_FOLDER=/app/data/uploads
      - DOWNLOAD_FOLDER=/app/data/downloads
    restart: unless-stopped

volumes:
  data:
    name: chopone_data
