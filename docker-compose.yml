version: "3.8"

services:
  frontend:
    build:
      context: ./choponefront
      dockerfile: Dockerfile
    networks:
      - chopone_network
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped

  backend:
    build:
      context: ./choponeback
      dockerfile: Dockerfile
    networks:
      - chopone_network
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - data:/app/data
    environment:
      - FLASK_ENV=production
      - DATA_DIR=/app/data
      - UPLOAD_FOLDER=/app/data/uploads
      - DOWNLOAD_FOLDER=/app/data/downloads
    restart: unless-stopped

networks:
  chopone_network:
    name: chopone_network

volumes:
  data:
    name: chopone_data
